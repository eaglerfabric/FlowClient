<style>
/* FULLBRIGHT */
body {
	filter: brightness(1.8) contrast(1.15) saturate(1.2);
}

/* CROSSHAIR */
#crosshair {
	position: fixed;
	top: 50%;
	left: 50%;
	width: 10px;
	height: 10px;
	transform: translate(-50%, -50%);
	display: none;
	pointer-events: none;
	z-index: 9999;
}
#crosshair:before, #crosshair:after {
	content: "";
	position: absolute;
	background: white;
}
#crosshair:before { width: 10px; height: 2px; top: 4px; left: 0; }
#crosshair:after { width: 2px; height: 10px; left: 4px; top: 0; }

/* MENU */
#menu {
	position: fixed;
	top: 120px;
	left: 120px;
	width: 280px;
	background: rgba(20,20,20,0.95);
	color: white;
	border-radius: 10px;
	font-family: sans-serif;
	display: none;
	z-index: 9999;
}
#menuHeader {
	padding: 10px;
	background: #333;
	cursor: grab;
	font-weight: bold;
}
#menuContent {
	padding: 10px;
}
button {
	width: 100%;
	margin-top: 6px;
}

/* TOAST */
#toast {
	position: fixed;
	top: 20px;
	left: 50%;
	transform: translateX(-50%);
	background: rgba(0,0,0,0.8);
	color: white;
	padding: 8px 12px;
	border-radius: 6px;
	opacity: 0;
	transition: 0.3s;
	z-index: 9999;
}
#toast.show {
	opacity: 1;
	transform: translateX(-50%) translateY(10px);
}

/* KEY HUD */
#keyhud {
	position: fixed;
	bottom: 20px;
	right: 20px;
	background: rgba(0,0,0,0.6);
	color: white;
	padding: 8px;
	border-radius: 8px;
	font-family: sans-serif;
	z-index: 9999;
}
.key {
	padding: 2px 6px;
	background: #444;
	border-radius: 4px;
	margin: 2px;
	display: inline-block;
}
.key.active {
	background: lime;
	color: black;
}
</style>

<script>
"use strict";

let menuOpen = false;
let crosshair = false;

/* TOAST */
function showToast(t) {
	const el = document.getElementById("toast");
	el.textContent = t;
	el.classList.add("show");
	setTimeout(() => el.classList.remove("show"), 2000);
}

/* MENU */
function toggleMenu() {
	menuOpen = !menuOpen;
	document.getElementById("menu").style.display = menuOpen ? "block" : "none";
}

/* CROSSHAIR */
function toggleCrosshair() {
	crosshair = !crosshair;
	document.getElementById("crosshair").style.display = crosshair ? "block" : "none";
}

/* MP3 */
function playMP3() {
	const f = document.getElementById("mp3").files[0];
	if (!f) return;
	const a = document.getElementById("audio");
	a.src = URL.createObjectURL(f);
	a.loop = true;
	a.play();
}

function stopMP3() {
	const a = document.getElementById("audio");
	a.pause();
	a.currentTime = 0;
}

/* KEYBINDS */
window.addEventListener("keydown", (e) => {
	if (e.code === "ShiftRight") toggleMenu();

	const map = {
		KeyW:"w", KeyA:"a", KeyS:"s", KeyD:"d", Space:"space"
	};

	if (map[e.code]) {
		const el = document.getElementById(map[e.code]);
		if (el) el.classList.add("active");
	}
});

window.addEventListener("keyup", (e) => {
	const map = {
		KeyW:"w", KeyA:"a", KeyS:"s", KeyD:"d", Space:"space"
	};

	if (map[e.code]) {
		const el = document.getElementById(map[e.code]);
		if (el) el.classList.remove("active");
	}
});

/* DRAG MENU */
let dragging = false, ox=0, oy=0;

window.addEventListener("load", () => {
	showToast("Press Right Shift to open Utility menu!");
});

</script>

		<script type="text/javascript">

					alert("HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP");

						worldsDB: "worlds",
						logInvalidCerts: true,
						servers: [
							{ addr: "DON'T CONNECT TO THIS", name: "Random servers from Eagler Server List" };
							{ addr: "wss://mc.voidsent.net", name: "Voidsent MC" };
							{ addr: "wss://vanillamc.org", name: "VanillaMC" };
							{ addr: "wss://mc.nullsworld.net", name: "null's World" };
							{ addr: "wss://tuff.ws", name: "TuffNET" };
							{ addr: "wss://eagler.skeletonmc.com", name: "SkeletonMC" }
						],
						relays: [
							{ addr: "wss://relay.deev.is/", comment: "lax1dude relay #1", primary: relayId == 0 },
							{ addr: "wss://relay.lax1dude.net/", comment: "lax1dude relay #2", primary: relayId == 1 },
							{ addr: "wss://relay.shhnowisnottheti.me/", comment: "ayunami relay #1", primary: relayId == 2 }

		</script>

	<body style="margin:0px;width:100vw;height:100vh;overflow:hidden;" id="game_frame">

<!-- UI -->
<div id="crosshair"></div>

<div id="toast"></div>

<div id="menu">
	<div id="menuHeader">Flow Utilities</div>
	<div id="menuContent">
		<button onclick="toggleCrosshair()">Toggle Crosshair</button>
		<input type="file" id="mp3" accept="audio/mp3">
		<button onclick="playMP3()">Play MP3</button>
		<button onclick="stopMP3()">Stop</button>
		<audio id="audio"></audio>
	</div>
</div>

<div id="keyhud">
	<div>W A S D + SPACE</div>

		<span id="s" class="key">S</span>

		<span id="space" class="key">SPACE</span>
	</div>
</div>
